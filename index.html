    function App() {
      const [isProcessing, setIsProcessing] = useState(false);
      const [statusInfo, setStatusInfo] = useState({ type: 'idle', message: 'CSVファイルを選択してください' });

      // --- 仮想スクロールとマスタデータの状態管理 ---
      const [scrollTop, setScrollTop] = useState(0);
      const [zipcodeIndex, setZipcodeIndex] = useState({});
      const [keywordRules, setKeywordRules] = useState([]); // キーワードマスタの保持用
      const [reverseCodeMap, setReverseCodeMap] = useState({}); // 表示用の逆引き辞書
      const [isMasterLoading, setIsMasterLoading] = useState(true);

      useEffect(() => {
        // 郵便番号マスタとキーワードマスタの2つのJSONを並行してダウンロード（Promise.all）
        Promise.all([
          fetch('./zipcode_master.json').then(res => {
            if (!res.ok) throw new Error('Network error (zipcode_master)');
            return res.json();
          }),
          fetch('./keyword_master.json').then(res => {
            if (!res.ok) throw new Error('Network error (keyword_master)');
            return res.json();
          })
        ])
        .then(([zipData, keywordData]) => {
          // --- 1. 郵便番号マスタの構築 ---
          const index = {};
          zipData.forEach(item => {
            const pCode = String(Number(item.pref));
            const cCodeRaw = String(item.city).trim();
            const cCode = String(Number(cCodeRaw.length > 3 ? cCodeRaw.slice(-3) : cCodeRaw));
            
            if (!index[pCode]) index[pCode] = {};
            if (!index[pCode][cCode]) index[pCode][cCode] = [];
            index[pCode][cCode].push({ address: item.address, zip: item.zip });
          });
          for (const pref in index) {
            for (const city in index[pref]) {
              index[pref][city].sort((a, b) => b.address.length - a.address.length);
            }
          }
          setZipcodeIndex(index);

          // --- 2. キーワードマスタの構築 ---
          // {"キーワード": "コード"} という形式のJSONから、検索しやすい配列の形に変換
          const rules = Object.entries(keywordData).map(([keyword, code]) => ({ keyword, code }));
          const revMap = {};
          rules.forEach(r => { revMap[r.code] = r.keyword; });
          
          setKeywordRules(rules);
          setReverseCodeMap(revMap);

          setIsMasterLoading(false); // 2つの読み込みが完了したらブロックを解除
        })
        .catch(err => {
          console.warn("マスタデータが読み込めませんでした。同階層に zipcode_master.json と keyword_master.json を配置してください。", err);
          setIsMasterLoading(false); // エラー時もとりあえずUIブロックを解除
        });
      }, []);

      const TARGET_COLUMNS = [
        '仕事番号', '雇用形態備考', '仕事名', 'キャッチコピー', 'インフォメーション',
        '仕事内容', '勤務時間', '休日・休暇', '給与備考', '月収例', '年収例',

      ];

      const parseCSV = (text) => {
        const result = [];
        let row = [];
        let inQuotes = false;
        let cell = '';
        for (let i = 0; i < text.length; i++) {
          const char = text[i];
          if (inQuotes) {
            if (char === '"') {
              if (i + 1 < text.length && text[i + 1] === '"') {
                cell += '"';
                i++; 
              } else {
                inQuotes = false;
              }
            } else {
              cell += char;
            }
          } else {
            if (char === '"') {
              inQuotes = true;
            } else if (char === ',') {
              row.push(cell);
              cell = '';
            } else if (char === '\n' || char === '\r') {
              row.push(cell);
              result.push(row);
              row = [];
              cell = '';
              if (char === '\r' && i + 1 < text.length && text[i + 1] === '\n') {
                i++; 
              }
            } else {
              cell += char;
            }
          }
        }
        if (cell !== '' || row.length > 0) {
          row.push(cell);
          result.push(row);
        }
        if (result.length > 0 && result[result.length - 1].length === 1 && result[result.length - 1][0] === '') {
          result.pop();
        }
        return result;
      };

      const generateCSV = (data) => {
        return data.map(row => {
          return row.map(cell => {
            let str = String(cell || '');
            if (str.includes(',') || str.includes('\n') || str.includes('\r') || str.includes('"')) {
              return '"' + str.replace(/"/g, '""') + '"';
            }
            return str;
          }).join(',');
        }).join('\r\n');
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setIsProcessing(true);
        setStatusInfo({ type: 'processing', message: '処理中...' });

        const processFile = (encodingToUse) => {
          const reader = new FileReader();
          reader.onload = (event) => {
            setTimeout(() => {
              try {
                const text = event.target.result;
                const parsed = parseCSV(text);
                
                if (parsed.length <= 1) {
                  setStatusInfo({ type: 'error', message: 'CSVデータが空か、ヘッダー行しかありません。' });
                  setIsProcessing(false);
                  return;
                }

                const headerRow = parsed[0];
                const indices = [];
                let jobIdx = -1, featIdx = -1, tagsIdx = -1, jobIdIdx = -1, jobNameIdx = -1;
                let prefIdx = -1, cityIdx = -1, addressIdx = -1, zipOutIdx = -1;

                headerRow.forEach((colName, idx) => {
                  const cleanName = colName.trim();
                  if (TARGET_COLUMNS.includes(cleanName)) indices.push(idx);
                  if (cleanName === '職種コード') jobIdx = idx;
                  else if (cleanName === '特徴コード') featIdx = idx;
                  else if (cleanName === 'Indeed用求人関連タグ') tagsIdx = idx;
                  else if (cleanName === '仕事番号') jobIdIdx = idx;
                  else if (cleanName === '仕事名') jobNameIdx = idx;
                  else if (cleanName === '県コード1') prefIdx = idx;
                  else if (cleanName === '市区町村コード1') cityIdx = idx;
                  else if (cleanName === '勤務地住所1') addressIdx = idx;
                  else if (cleanName === '郵便番号1') zipOutIdx = idx;
                });

                if (indices.length === 0 && jobIdx === -1 && featIdx === -1) {
                  setStatusInfo({ type: 'error', message: '検索対象の列が見つかりません。ヘッダー名を確認してください。' });
                  setIsProcessing(false);
                  return;
                }

                const newPreviewData = [];

                const processedData = parsed.map((row, rowIndex) => {
                  if (rowIndex === 0) {
                    const newHeader = tagsIdx !== -1 ? [...row] : [...row, 'Indeed用求人関連タグ'];
                    if (zipOutIdx === -1) newHeader.push('郵便番号1');
                    return newHeader;
                  }

                  let combinedText = '';
                  indices.forEach(idx => { if (row[idx]) combinedText += String(row[idx]) + ' '; });

                  if (jobIdx !== -1 && row[jobIdx]) {
                    const code = String(row[jobIdx]).trim();
                    if (JOB_TYPE_MAP[code]) combinedText += JOB_TYPE_MAP[code] + ' ';
                  }

                  if (featIdx !== -1 && row[featIdx]) {
                    const codesStr = String(row[featIdx]).trim();
                    const codes = codesStr.split('::');
                    codes.forEach(code => {
                      const cleanCode = code.trim();
                      if (FEATURE_MAP[cleanCode]) combinedText += FEATURE_MAP[cleanCode] + ' ';
                    });
                  }

                  // 外部ファイルから取得した keywordRules を使用して判定
                  const foundCodes = [];
                  const foundKeywords = [];
                  keywordRules.forEach(rule => {
                    if (combinedText.includes(rule.keyword)) {
                      foundCodes.push(rule.code);
                      foundKeywords.push(rule.keyword);
                    }
                  });

                  let existingCodes = [];
                  if (tagsIdx !== -1 && row[tagsIdx]) {
                    existingCodes = String(row[tagsIdx]).trim().split('::').filter(Boolean);
                  }

                  const mergedCodes = [...existingCodes, ...foundCodes];
                  const uniqueCodes = [...new Set(mergedCodes)].filter(c => c !== '');
                  
                  const existingKeywords = existingCodes.map(code => reverseCodeMap[code] || code);
                  const mergedKeywords = [...existingKeywords, ...foundKeywords];
                  const uniqueKeywords = [...new Set(mergedKeywords)].filter(k => k !== '');

                  const uniqueCodesStr = uniqueCodes.join('::');

                  // --- 郵便番号の特定ロジック ---
                  let zipCodeFound = "";
                  if (prefIdx !== -1 && cityIdx !== -1 && addressIdx !== -1) {
                    const prefRaw = row[prefIdx] ? String(row[prefIdx]).trim() : "";
                    const cityRaw = row[cityIdx] ? String(row[cityIdx]).trim() : "";
                    
                    if (prefRaw !== "" && cityRaw !== "") {
                      const prefCode = String(Number(prefRaw));
                      const cityCode = String(Number(cityRaw.length > 3 ? cityRaw.slice(-3) : cityRaw));
                      const workAddress = row[addressIdx] ? String(row[addressIdx]).trim() : "";

                      if (zipcodeIndex[prefCode] && zipcodeIndex[prefCode][cityCode]) {
                        const candidates = zipcodeIndex[prefCode][cityCode];
                        const match = candidates.find(c => workAddress.includes(c.address));
                        if (match) zipCodeFound = match.zip;
                      }
                    }
                  }
                  
                  const formattedZip = zipCodeFound ? `="${zipCodeFound}"` : "";

                  newPreviewData.push({
                    jobId: jobIdIdx !== -1 && row[jobIdIdx] ? row[jobIdIdx] : '-',
                    jobName: jobNameIdx !== -1 && row[jobNameIdx] ? row[jobNameIdx] : '-',
                    tagsCode: uniqueCodesStr,
                    tagsText: uniqueKeywords.join('::'),
                    zip: zipCodeFound || '-'
                  });

                  const newRow = [...row];
                  if (tagsIdx !== -1) newRow[tagsIdx] = uniqueCodesStr;
                  else newRow.push(uniqueCodesStr);
                  
                  if (zipOutIdx !== -1) newRow[zipOutIdx] = formattedZip;
                  else newRow.push(formattedZip);
                  
                  return newRow;
                });

                setPreviewData(newPreviewData);

                const csvContent = generateCSV(processedData);
                
                // 出力は常に入力に関わらず Shift-JIS に変換する
                const unicodeArray = Encoding.stringToCode(csvContent);
                const sjisArray = Encoding.convert(unicodeArray, {
                  to: 'SJIS',
                  from: 'UNICODE'
                });
                
                const blob = new Blob([new Uint8Array(sjisArray)], { type: 'text/csv;charset=shift_jis;' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.setAttribute('href', url);
                link.setAttribute('download', `tagged_${file.name || 'data.csv'}`);
                link.setAttribute('target', '_blank');
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                setStatusInfo({ 
                  type: 'success', 
                  message: `完了しました！ ${processedData.length - 1} 件のデータを処理し、ダウンロードを開始しました。` 
                });

              } catch (error) {
                console.error(error);
                setStatusInfo({ type: 'error', message: '処理中にエラーが発生しました。ファイル形式を確認してください。' });
              } finally {
                setIsProcessing(false);
                setScrollTop(0);
                if (fileInputRef.current) fileInputRef.current.value = '';
              }
            }, 100);
          };
          reader.readAsText(file, encodingToUse);
        };

        if (fileEncoding === 'AUTO') {
          const blob = file.slice(0, 4096); 
          const bufferReader = new FileReader();
          
          bufferReader.onload = (e) => {
            const buffer = new Uint8Array(e.target.result);
            const detected = Encoding.detect(buffer);
            
            let encodingToUse = 'Shift_JIS';
            if (detected === 'UTF8' || detected === 'UNICODE') {
              encodingToUse = 'UTF-8';
            }
            
            processFile(encodingToUse);
          };
          bufferReader.readAsArrayBuffer(blob);
        } else {
          processFile(fileEncoding);
        }
      };

      const handleScroll = (e) => {
        setScrollTop(e.target.scrollTop);
      };

      const handleDownloadPreviewCSV = () => {
        // ヘッダー行を作成
        const headers = ['仕事番号', '仕事名', '郵便番号', 'Indeed用求人関連タグ', '求人タグの内容'];
        
        // プレビューデータから出力用の行を作成
        const rows = previewData.map(row => [
          row.jobId,
          row.jobName,
          row.zip !== '-' ? `="${row.zip}"` : "", // Excelの「0」落ち対策
          row.tagsCode,
          row.tagsText
        ]);

        const csvContent = generateCSV([headers, ...rows]);
        
        // Shift-JISに変換
        const unicodeArray = Encoding.stringToCode(csvContent);
        const sjisArray = Encoding.convert(unicodeArray, {
          to: 'SJIS',
          from: 'UNICODE'
        });
        
        const blob = new Blob([new Uint8Array(sjisArray)], { type: 'text/csv;charset=shift_jis;' });
        const url = URL.createObjectURL(blob);
        
        const link = document.createElement('a');
        link.setAttribute('href', url);
        link.setAttribute('download', `preview_data.csv`);
        link.setAttribute('target', '_blank');
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const rowHeight = 60;
      const containerHeight = 800;
      const overscan = 15;

      const startIndex = Math.max(0, Math.floor(scrollTop / rowHeight) - overscan);
      const endIndex = Math.min(previewData.length, Math.ceil((scrollTop + containerHeight) / rowHeight) + overscan);

      const visibleData = previewData.slice(startIndex, endIndex);

      const paddingTop = startIndex * rowHeight;
      const paddingBottom = Math.max(0, (previewData.length - endIndex) * rowHeight);

      return (
        <div className="min-h-screen bg-orange-50/50 flex flex-col items-center justify-center p-6 font-sans text-slate-700 relative overflow-hidden">
          
          <div className="absolute top-10 left-10 text-orange-200 animate-pulse"><Icons.Sparkles className="w-24 h-24" /></div>
          <div className="absolute bottom-10 right-10 text-pink-200 animate-bounce" style={{animationDuration: '3s'}}><Icons.Sparkles className="w-32 h-32" /></div>

          {currentView === 'main' ? (
            <div className="w-full max-w-2xl space-y-6 relative z-10">
              
              <header className="flex flex-col items-center text-center space-y-4 mb-8">
                <div className="bg-gradient-to-br from-pink-400 to-orange-400 p-4 rounded-full shadow-lg transform hover:rotate-12 transition-transform duration-300">
                  <Icons.Wand2 className="text-white w-10 h-10" />
                </div>
                <h1 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-orange-500 tracking-tight">
                  Indeed求人タグ＆郵便番号
                </h1>
                <p className="text-slate-500 font-medium bg-white/60 px-5 py-2 rounded-full shadow-sm border border-orange-100">
                  CSVを入れるだけ！タグと〒を自動付与します✨
                </p>
              </header>

              <div className="bg-white/80 backdrop-blur-sm p-8 rounded-[2.5rem] shadow-xl border-4 border-white">
                
                <div className="flex flex-col items-center mb-6">
                  <p className="text-xs font-bold text-slate-500 mb-2">読み込むCSVの文字コード</p>
                  <div className="bg-white p-1 rounded-full border border-pink-200 inline-flex shadow-sm">
                    <button
                      onClick={() => setFileEncoding('AUTO')}
                      className={`px-4 py-2 rounded-full text-sm font-bold transition-all ${
                        fileEncoding === 'AUTO' 
                          ? 'bg-gradient-to-r from-pink-400 to-orange-400 text-white shadow-md' 
                          : 'text-slate-400 hover:text-pink-500'
                      }`}
                    >
                      自動判定
                    </button>
                    <button
                      onClick={() => setFileEncoding('Shift_JIS')}
                      className={`px-4 py-2 rounded-full text-sm font-bold transition-all ${
                        fileEncoding === 'Shift_JIS' 
                          ? 'bg-gradient-to-r from-pink-400 to-orange-400 text-white shadow-md' 
                          : 'text-slate-400 hover:text-pink-500'
                      }`}
                    >
                      Shift-JIS
                    </button>
                    <button
                      onClick={() => setFileEncoding('UTF-8')}
                      className={`px-4 py-2 rounded-full text-sm font-bold transition-all ${
                        fileEncoding === 'UTF-8' 
                          ? 'bg-gradient-to-r from-pink-400 to-orange-400 text-white shadow-md' 
                          : 'text-slate-400 hover:text-pink-500'
                      }`}
                    >
                      UTF-8
                    </button>
                  </div>
                  <p className="text-[10px] text-pink-400 mt-2 font-medium">※ダウンロード時は自動的にShift-JISに変換されます</p>
                </div>

                <div 
                  className={`group border-4 border-dashed rounded-[2rem] p-12 flex flex-col items-center justify-center transition-all duration-300 cursor-pointer transform
                    ${isProcessing || isMasterLoading
                      ? 'border-purple-300 bg-purple-50 scale-95 cursor-wait' 
                      : 'border-pink-300 bg-white hover:bg-pink-50 hover:border-pink-400 hover:scale-105 shadow-inner'
                    }
                  `}
                  onClick={() => !isProcessing && !isMasterLoading && fileInputRef.current?.click()}
                >
                  {isProcessing || isMasterLoading ? (
                    <div className="relative mb-4">
                      <Icons.Loader2 className="w-16 h-16 text-purple-400 animate-spin" />
                      <Icons.Sparkles className="w-6 h-6 text-yellow-400 absolute -top-2 -right-2 animate-ping" />
                    </div>
                  ) : (
                    <div className="bg-pink-100 p-4 rounded-full mb-4 group-hover:bg-pink-200 transition-colors">
                      <Icons.FileHeart className="w-12 h-12 text-pink-500 transform group-hover:-translate-y-1 transition-transform" />
                    </div>
                  )}
                  
                  <p className="font-bold text-slate-700 text-xl">
                    {isMasterLoading ? 'マスタデータ読込中...' : isProcessing ? '処理中...' : 'ここをクリックしてCSVをえらぶ'}
                  </p>
                  <p className="text-sm text-pink-500 mt-3 font-medium bg-pink-100/50 px-4 py-1.5 rounded-full">
                    {isMasterLoading ? '少し待ってね' : isProcessing ? '少々お待ちください...' : '※えらぶとすぐにダウンロードがはじまります'}
                  </p>
                  
                  <input 
                    type="file" 
                    accept=".csv" 
                    className="hidden" 
                    ref={fileInputRef}
                    onChange={handleFileUpload}
                    disabled={isProcessing || isMasterLoading}
                  />
                </div>

                <div className="mt-8 flex flex-col items-center justify-center min-h-[4rem]">
                  {statusInfo.type === 'processing' && (
                    <p className="text-purple-600 font-bold flex items-center bg-purple-50 px-4 py-2 rounded-full animate-pulse">
                      <Icons.Wand2 className="w-5 h-5 mr-2" />
                      {statusInfo.message}
                    </p>
                  )}
                  {statusInfo.type === 'success' && (
                    <div className="flex flex-col items-center space-y-4 animate-in fade-in slide-in-from-bottom-2">
                      <div className="text-green-600 font-bold flex items-center bg-green-50 px-5 py-3 rounded-full border border-green-200 shadow-sm">
                        <Icons.CheckCircle className="w-5 h-5 mr-2" />
                        {statusInfo.message}
                      </div>
                      <button
                        onClick={() => setCurrentView('preview')}
                        className="flex items-center space-x-2 px-6 py-3 bg-gradient-to-r from-blue-400 to-cyan-400 text-white rounded-full hover:shadow-lg hover:scale-105 transition-all text-sm font-bold shadow-md"
                      >
                        <Icons.Table className="w-5 h-5" />
                        <span>抽出結果の確認表を見る</span>
                      </button>
                    </div>
                  )}
                  {statusInfo.type === 'error' && (
                    <div className="text-red-500 font-bold flex items-center bg-red-50 px-5 py-3 rounded-full border border-red-200">
                      <Icons.AlertCircle className="w-5 h-5 mr-2" />
                      {statusInfo.message}
                    </div>
                  )}
                </div>

              </div>
              
            </div>
          ) : (
            <div className="w-full max-w-[1280px] space-y-4 animate-in fade-in slide-in-from-bottom-4 relative z-10">
              <div className="flex items-center justify-between bg-white/80 backdrop-blur-sm p-4 rounded-2xl shadow-sm border border-white">
                <h2 className="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-orange-500 flex items-center">
                  <Icons.Table className="w-6 h-6 mr-2 text-pink-500" />
                  抽出結果プレビュー
                </h2>
                <div className="flex space-x-3">
                  <button
                    onClick={handleDownloadPreviewCSV}
                    className="flex items-center space-x-2 px-5 py-2.5 bg-gradient-to-r from-green-400 to-emerald-400 text-white rounded-full hover:shadow-lg hover:scale-105 transition-all text-sm font-bold shadow-sm"
                  >
                    <Icons.Download className="w-4 h-4" />
                    <span>プレビュー表をダウンロード</span>
                  </button>
                  <button
                    onClick={() => setCurrentView('main')}
                    className="flex items-center space-x-2 px-5 py-2.5 bg-slate-100 text-slate-600 rounded-full hover:bg-slate-200 hover:text-slate-800 transition-all text-sm font-bold shadow-sm"
                  >
                    <Icons.ArrowLeft className="w-4 h-4" />
                    <span>アップロード画面に戻る</span>
                  </button>
                </div>
              </div>
              
              <div className="bg-white/90 backdrop-blur-sm rounded-3xl shadow-xl border-4 border-white overflow-hidden">
                <div className="max-h-[65vh] overflow-auto" onScroll={handleScroll}>
                  <table className="w-full min-w-max text-sm text-left border-collapse">
                    <thead className="sticky top-0 z-40 shadow-sm">
                      <tr style={{ height: '50px' }}>
                        <th className="sticky left-0 top-0 z-40 w-[140px] min-w-[140px] px-3 py-3 font-bold text-orange-900 bg-orange-100 border-b-2 border-orange-200">仕事番号</th>
                        <th className="sticky left-[140px] top-0 z-40 w-[360px] min-w-[360px] px-3 py-3 font-bold text-orange-900 bg-orange-100 border-b-2 border-orange-200 shadow-[10px_0_10px_-10px_rgba(0,0,0,0.15)] truncate">仕事名</th>
                        <th className="w-[100px] min-w-[100px] max-w-[100px] px-3 py-3 font-bold text-orange-900 bg-orange-100 border-b-2 border-orange-200 truncate">郵便番号</th>
                        <th className="w-[160px] min-w-[160px] max-w-[160px] px-3 py-3 font-bold text-pink-800 bg-pink-100 border-b-2 border-pink-200 truncate" title="Indeed用求人関連タグ">Indeed用求人関連タグ</th>
                        <th className="px-3 py-3 font-bold text-purple-800 bg-purple-100 border-b-2 border-purple-200">求人タグの内容</th>
                      </tr>
                    </thead>
                    <tbody className="bg-white">
                      {paddingTop > 0 && (
                        <tr style={{ height: `${paddingTop}px` }}>
                          <td colSpan={5} className="p-0 border-0"></td>
                        </tr>
                      )}
                      
                      {visibleData.map((row, idx) => {
                        const absoluteIdx = startIndex + idx;
                        return (
                          <tr key={absoluteIdx} style={{ height: `${rowHeight}px` }} className="group border-b border-orange-50">
                            <td className="sticky left-0 z-20 p-0 bg-white group-hover:bg-orange-50 transition-colors border-r border-orange-50/50">
                              <div className="w-[140px] h-[60px] px-3 py-2 flex items-center overflow-hidden">
                                <span className="text-slate-500 font-medium break-all leading-tight max-h-full overflow-hidden" title={row.jobId}>{row.jobId}</span>
                              </div>
                            </td>
                            <td className="sticky left-[140px] z-20 p-0 bg-white group-hover:bg-orange-50 transition-colors shadow-[10px_0_10px_-10px_rgba(0,0,0,0.15)]">
                              <div className="w-[360px] h-[60px] px-3 py-2 flex items-center overflow-hidden">
                                <span className="text-slate-700 font-bold truncate block w-full" title={row.jobName}>
                                  {row.jobName.length > 28 ? row.jobName.substring(0, 28) + '…' : row.jobName}
                                </span>
                              </div>
                            </td>
                            <td className="p-0 bg-transparent group-hover:bg-orange-50 transition-colors">
                              <div className="w-[100px] h-[60px] px-3 py-2 flex items-center overflow-hidden border-r border-orange-50/50">
                                <span className="text-slate-500 font-bold truncate block w-full text-center" title={row.zip}>
                                  {row.zip}
                                </span>
                              </div>
                            </td>
                            <td className="p-0 bg-transparent group-hover:bg-orange-50 transition-colors">
                              <div className="w-[160px] h-[60px] px-3 py-2 flex items-center overflow-hidden">
                                <span className="text-slate-500 font-mono text-xs truncate block w-full" title={row.tagsCode}>
                                  {row.tagsCode || <span className="text-slate-300">-</span>}
                                </span>
                              </div>
                            </td>
                            <td className="p-0 bg-transparent group-hover:bg-orange-50 transition-colors">
                              <div className="h-[60px] px-3 py-2 flex items-center overflow-hidden">
                                <div className="flex flex-nowrap gap-1">
                                  {row.tagsText ? (
                                    row.tagsText.split('::').map((tag, i) => (
                                      <span key={i} className="whitespace-nowrap shrink-0 inline-block bg-gradient-to-r from-purple-100 to-pink-100 text-purple-700 px-2 py-1 rounded-full text-xs font-bold border border-purple-200">
                                        {tag}
                                      </span>
                                    ))
                                  ) : (
                                    <span className="text-slate-300">-</span>
                                  )}
                                </div>
                              </div>
                            </td>
                          </tr>
                        );
                      })}

                      {paddingBottom > 0 && (
                        <tr style={{ height: `${paddingBottom}px` }}>
                          <td colSpan={5} className="p-0 border-0"></td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
                <div className="bg-orange-50/80 px-5 py-3 border-t-2 border-white text-xs text-orange-600 font-medium flex justify-between items-center relative z-40">
                  <span>全 <strong className="text-lg">{previewData.length}</strong> 件を表示中</span>
                  <span className="opacity-70">※表を左右にスクロールして内容を確認できます。</span>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    .animate-in { animation-duration: 0.3s; animation-fill-mode: forwards; }
    .fade-in { animation-name: fadeIn; }
    .slide-in-from-bottom-2 { animation-name: slideInBottom2; }
    .slide-in-from-bottom-4 { animation-name: slideInBottom4; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInBottom2 { from { transform: translateY(0.5rem); } to { transform: translateY(0); } }
    @keyframes slideInBottom4 { from { transform: translateY(1rem); } to { transform: translateY(0); } }
  </style>
</body>
</html>
